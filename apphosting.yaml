runConfig:
  runtime: nodejs22
  concurrency: 80
  minInstances: 0
  maxInstances: 10

# Production App Hosting configuration. Secret values are resolved from Google
# Secret Manager and must never be committed to this file.
env:
  - variable: APP_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SITE_URL
    value: https://findyourchurchpalacios.org
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ACTIVE_MARKET_KEY
    value: palacios
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ENABLE_DONATIONS
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ZEFFY_FORM_PATH
    value: /embed/donation-form/helping-churches-reach-people-through-technology
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FYC_PROD_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: findyourchurch-24562.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: findyourchurch-24562
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: findyourchurch-24562.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "443706380375"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:443706380375:web:e2f1c184b87865e003d312
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_ID
    value: findyourchurchpal
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_CHECK_SITE_KEY
    value: 6LdXVlMtAAAAANSeRDapdJcyUBsG6nqO37G1hifT
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_USE_FIREBASE_EMULATORS
    value: "false"
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: findyourchurch-24562
    availability:
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: findyourchurch-24562.firebasestorage.app
    availability:
      - RUNTIME

  - variable: FIREBASE_DATABASE_ID
    value: findyourchurchpal
    availability:
      - RUNTIME

  - variable: PRODUCTION_FIREBASE_PROJECT_ID
    value: findyourchurch-24562
    availability:
      - RUNTIME

  - variable: APP_CHECK_ENFORCEMENT_MODE
    value: enforced
    availability:
      - RUNTIME

  - variable: GOOGLE_CLOUD_OPERATIONS_ENABLED
    value: "true"
    availability:
      - RUNTIME

  - variable: RETENTION_JOB_ENABLED
    value: "true"
    availability:
      - RUNTIME

  - variable: EMAIL_PROVIDER
    value: smtp
    availability:
      - RUNTIME

  - variable: EMAIL_FROM
    value: noreply@findyourchurchpalacios.org
